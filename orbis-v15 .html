// ─── CANVAS CHART HELPERS ─────────────────────────────────────────────────────
function drawAreaChart(canvas, data, keys, colors, opts={}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = {top:10, right:10, bottom:28, left:48};
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;
  ctx.clearRect(0,0,W,H);

  const allVals = data.flatMap(d => keys.map(k => d[k]||0));
  const minV = Math.min(0, ...allVals);
  const maxV = Math.max(...allVals) * 1.1 || 1;
  const scaleY = v => pad.top + cH - ((v - minV) / (maxV - minV)) * cH;
  const scaleX = i => pad.left + (i / (data.length-1)) * cW;

  // grid
  ctx.strokeStyle = '#1A2438'; ctx.lineWidth = 1;
  for(let i=0; i<=4; i++) {
    const y = pad.top + (i/4)*cH;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+cW, y); ctx.stroke();
    const val = maxV - (i/4)*(maxV-minV);
    ctx.fillStyle='#475569'; ctx.font='9px JetBrains Mono,monospace'; ctx.textAlign='right';
    ctx.fillText(`$${val>=1000?(val/1000).toFixed(0)+'k':val.toFixed(0)}`, pad.left-4, y+3);
  }

  // zero line if negative
  if(minV < 0) {
    const zy = scaleY(0);
    ctx.strokeStyle='#FF6B3580'; ctx.lineWidth=1.5;
    ctx.setLineDash([4,3]); ctx.beginPath(); ctx.moveTo(pad.left,zy); ctx.lineTo(pad.left+cW,zy); ctx.stroke();
    ctx.setLineDash([]);
  }

  // x labels
  ctx.fillStyle='#475569'; ctx.font='10px Syne,sans-serif'; ctx.textAlign='center';
  const step = Math.ceil(data.length / 10);
  data.forEach((d,i) => { if(i%step===0) ctx.fillText(d.month||d.d, scaleX(i), H-6); });

  // draw areas + lines
  keys.forEach((key, ki) => {
    const color = colors[ki];
    const pts = data.map((d,i) => [scaleX(i), scaleY(d[key]||0)]);

    if(ki === 0) {
      // filled area
      const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top+cH);
      grad.addColorStop(0, color+'40'); grad.addColorStop(1, color+'00');
      ctx.beginPath();
      ctx.moveTo(pts[0][0], scaleY(0));
      pts.forEach(([x,y]) => ctx.lineTo(x,y));
      ctx.lineTo(pts[pts.length-1][0], scaleY(0));
      ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
    }

    // line
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = ki===0 ? 2.5 : 1.5;
    if(ki > 0) ctx.setLineDash([5,3]);
    pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
    ctx.stroke(); ctx.setLineDash([]);

    // real dot
    data.forEach((d,i) => {
      if(d.real) {
        ctx.beginPath(); ctx.arc(pts[i][0], pts[i][1], 5, 0, Math.PI*2);
        ctx.fillStyle=color; ctx.fill();
        ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
      }
      // negative dot
      if((d[key]||0) < 0 && ki===0) {
        ctx.beginPath(); ctx.arc(pts[i][0], pts[i][1], 4, 0, Math.PI*2);
        ctx.fillStyle='#FF6B35'; ctx.fill();
      }
    });
  });
}

function drawBarChart(canvas, data, keys, colors, opts={}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = {top:10, right:10, bottom:28, left:48};
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;
  ctx.clearRect(0,0,W,H);

  const allVals = data.flatMap(d => keys.map(k => d[k]||0));
  const minV = Math.min(0, ...allVals);
  const maxV = Math.max(...allVals) * 1.1 || 1;
  const scaleY = v => pad.top + cH - ((v-minV)/(maxV-minV))*cH;

  ctx.strokeStyle='#1A2438'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++) {
    const y = pad.top+(i/4)*cH;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cW,y); ctx.stroke();
    const val = maxV-(i/4)*(maxV-minV);
    ctx.fillStyle='#475569'; ctx.font='9px JetBrains Mono,monospace'; ctx.textAlign='right';
    ctx.fillText(`$${val>=1000?(val/1000).toFixed(0)+'k':val.toFixed(0)}`,pad.left-4,y+3);
  }

  const n = keys.length;
  const groupW = cW / data.length;
  const barW = Math.max(4, groupW/n - 3);
  const groupOffset = i => pad.left + i*groupW + (groupW - n*barW - (n-1)*2)/2;

  ctx.fillStyle='#475569'; ctx.font='10px Syne,sans-serif'; ctx.textAlign='center';
  data.forEach((d,i) => {
    const step = Math.ceil(data.length/10);
    if(i%step===0) ctx.fillText(d.month||d.d, groupOffset(i)+barW*n/2, H-6);
    keys.forEach((key,ki) => {
      const v = d[key]||0;
      const x = groupOffset(i) + ki*(barW+2);
      const y0 = scaleY(0), y1 = scaleY(v);
      const top = Math.min(y0,y1), barH = Math.abs(y0-y1);
      ctx.fillStyle = colors[ki] + (opts.dimKey && key!==opts.dimKey ? '80' : 'FF');
      if(!d.real && n===1) ctx.fillStyle = colors[ki]+'90';
      const r = 3;
      ctx.beginPath();
      ctx.moveTo(x+r,top); ctx.lineTo(x+barW-r,top);
      ctx.quadraticCurveTo(x+barW,top,x+barW,top+r);
      ctx.lineTo(x+barW,top+barH); ctx.lineTo(x,top+barH);
      ctx.lineTo(x,top+r); ctx.quadraticCurveTo(x,top,x+r,top);
      ctx.closePath(); ctx.fill();
    });
  });
}

function drawDonut(canvas, data) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const cx=W/2, cy=H/2, outerR=Math.min(W,H)/2-4, innerR=outerR*0.55;
  const total = data.reduce((s,d)=>s+d.value,0);
  let angle = -Math.PI/2;
  data.forEach(d => {
    const sweep = (d.value/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,outerR,angle,angle+sweep);
    ctx.closePath(); ctx.fillStyle=d.color; ctx.fill();
    angle+=sweep+0.02;
  });
  ctx.beginPath(); ctx.arc(cx,cy,innerR,0,Math.PI*2);
  ctx.fillStyle='#0A1020'; ctx.fill();
}

function getCards(year) {
  return ENTITIES.map(e => {
    const cur = e.data.filter(d=>d.year===year);
    const py  = e.data.filter(d=>d.year===(parseInt(year)-1).toString());
    const realCur = cur.filter(d=>d.real);
    const last= realCur[realCur.length-1] || cur[cur.length-1] || {};
    const prev= realCur[realCur.length-2] || cur[cur.length-2] || {};

    // MoM
    const mom = prev.revenue>0?((last.revenue-prev.revenue)/prev.revenue)*100:0;

    // Same-month YoY: compare last real month of cur year vs same month in prev year
    const sameMonthPY = py.find(d=>d.month===last.month)||{};
    const yoy = sameMonthPY.revenue>0?((last.revenue-sameMonthPY.revenue)/sameMonthPY.revenue)*100:0;

    // YTD: all real months in cur year up to and including last.month
    const MONTH_ORDER = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const lastMonthIdx = MONTH_ORDER.indexOf(last.month);
    const ytdMonths = MONTH_ORDER.slice(0, lastMonthIdx+1);
    const ytdCur = cur.filter(d=>ytdMonths.includes(d.month)&&d.real);
    const ytdPY  = py.filter(d=>ytdMonths.includes(d.month)&&d.real);
    const ytdRev = ytdCur.reduce((s,d)=>s+d.revenue,0);
    const ytdRevPY = ytdPY.reduce((s,d)=>s+d.revenue,0);
    const ytdGrowth = ytdRevPY>0?((ytdRev-ytdRevPY)/ytdRevPY)*100:null;

    const annualRev = cur.filter(d=>d.real).reduce((s,d)=>s+d.revenue,0);
    const annualPY  = py.filter(d=>d.real).reduce((s,d)=>s+d.revenue,0);
    const annGrowth = annualPY>0?((annualRev-annualPY)/annualPY)*100:0;
    const realCount = cur.filter(d=>d.real).length;
    return {...e,last,prev,mom,yoy,sameMonthPY,annualRev,annGrowth,cur,realCount,
      ytdRev,ytdRevPY,ytdGrowth,ytdMonths:ytdCur.length};
  });
}

  const totalPrev = cards.reduce((s,e)=>s+e.prev.revenue,0);
  const totalMom  = totalPrev>0?((totalLast-totalPrev)/totalPrev)*100:0;
  // YTD consolidated
  const MONTH_ORDER_C = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

          ${preview.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:6px">
              <div style="width:5px;height:5px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
              <div>
                <div style="font-size:11px;color:#CBD5E1;font-weight:600">${s.name}</div>
                <div style="font-size:9px;color:#334155">${s.entity}</div>
              </div>
            </div>
            <div class="mono" style="font-size:11px;color:${s.color};font-weight:700">${fmt(s.value,true)}</div>
          </div>`).join('')}
          ${allSubs.length > 4 ? `<div style="font-size:10px;color:#334155;text-align:center;padding-top:2px">+ ${allSubs.length-4} mais...</div>` : ''}
        </div>

        <!-- Botão ver todas -->
        <button onclick="openSubsModal(${focusId})" style="width:100%;background:#0A1020;border:1px solid #1E2D45;color:#94A3B8;padding:8px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;transition:all .15s" onmouseover="this.style.borderColor='#2A3A58';this.style.color='#E2E8F0'" onmouseout="this.style.borderColor='#1E2D45';this.style.color='#94A3B8'">
          Ver todas + datas de cobrança →
        </button>
      </div>`;
    })()}


    <!-- Ranking -->
    <div class="card" style="padding:20px">
      <div style="font-weight:700;font-size:14px;margin-bottom:3px">Ranking · ${activeYear}</div>
      <div style="color:#475569;font-size:12px;margin-bottom:14px">Por faturamento, último mês</div>
      <div style="display:flex;flex-direction:column;gap:11px">
        ${[...cards].sort((a,b)=>(isPastYear?b.annualRev-a.annualRev:b.last.revenue-a.last.revenue)).map((e,i)=>{
          const share=totalLast>0?((isPastYear?e.annualRev:e.last.revenue)/(isPastYear?cards.reduce((s,c)=>s+c.annualRev,0):totalLast))*100:0;
          return `<div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <div style="display:flex;align-items:center;gap:5px">
                <span style="font-size:10px;color:#334155;width:14px">#${i+1}</span>
                <span style="font-size:12px;font-weight:600">${e.name}</span>
                ${e.realCount>0?`<span class="real-badge">✓</span>`:''}
              </div>
              <div style="text-align:right">
                <div class="mono" style="font-size:12px;color:${e.color}">${isPastYear ? fmt(e.annualRev,true) : fmt(e.last.revenue,true)}</div>
                <div style="font-size:10px;color:#475569">${share.toFixed(0)}% do total</div>
              </div>
            </div>
            <div style="height:3px;background:#1A2438;border-radius:2px">
              <div style="width:${share.toFixed(0)}%;height:100%;background:${e.color};border-radius:2px"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>


  </div>

  <div style="text-align:center;font-size:10px;color:#1A2438;margin-top:18px">
    Dr Stairs Jan–Mar/2025 · Abr–Ago/2025 · Out–Dez/2025 · Jan–Fev/2026 · Dados reais  ·  Amanda's Maid Jan–Mar/2025 · Abr–Dez/2025 · Jan–Fev/2026 · Dados reais  ·  Set/2025 Dr Stairs aguardando  ·  Lume · Ocean · Conta Pessoal aguardando statements  ·  Orbis Financial Platform v13
  </div>
  `;

  // Draw charts
  requestAnimationFrame(() => {
    const c1 = document.getElementById('c-total');
    if(c1) { c1.width = c1.offsetWidth; drawAreaChart(c1, yearData, ['total'], ['#00E5A0']); }

    const cyoy = document.getElementById('c-yoy');
    if(cyoy) { cyoy.width = cyoy.offsetWidth; drawBarChart(cyoy, yearData, ['total'], ['#00E5A0']); }

    if(focused) {
      const cfa = document.getElementById('c-focused-area');
      if(cfa) { cfa.width = cfa.offsetWidth; drawAreaChart(cfa, focused.cur, ['revenue','costs'], [focused.color,'#FF6B35']); }
      const cfb = document.getElementById('c-focused-bar');
      if(cfb) {
        cfb.width = cfb.offsetWidth;
        // color each bar
        const profitData = focused.cur.map(d=>({...d}));
        drawBarChart(cfb, profitData, ['profit'], [focused.color]);
      }
    }
  });
}

function openMktModal(focusId) {
  const focusIdNum = focusId ? parseInt(focusId) : null;
  const filteredEntities = focusIdNum ? ENTITIES.filter(e=>e.id===focusIdNum) : ENTITIES;
  const focusedEntity = focusIdNum ? ENTITIES.find(e=>e.id===focusIdNum) : null;

  const byEntity = filteredEntities.map(e => ({
    ...e,
    items: (MARKETING[e.id] && MARKETING[e.id].items) || []
  })).filter(e => e.items.length > 0);

  const grandTotal = byEntity.reduce((s,e)=>s+e.items.reduce((a,i)=>a+i.value,0),0);
  const monthNames = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const today = new Date();

  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:19px;font-weight:800">📣 Investimento em Marketing</div>
        <div style="color:#475569;font-size:12px;margin-top:2px">${focusedEntity ? focusedEntity.name + ' · canais de tráfego ativos' : 'Todas as empresas · canais de tráfego ativos'}</div>
      </div>
      <div style="background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);border-radius:12px;padding:10px 18px;text-align:right">
        <div style="font-size:9px;color:#475569;letter-spacing:1px;text-transform:uppercase">Total Mensal</div>
        <div class="mono" style="font-size:24px;font-weight:700;color:#38BDF8">${fmt(grandTotal,true)}</div>
        <div style="font-size:10px;color:#475569">${fmt(grandTotal*12,true)}/ano</div>
      </div>
    </div>

    ${byEntity.map(e => {
      const entityTotal = e.items.reduce((s,i)=>s+i.value,0);
      return `<div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:8px;height:8px;border-radius:50%;background:${e.color}"></div>
            <span style="font-weight:700;font-size:13px;color:${e.color}">${e.name}</span>
            <span style="font-size:10px;color:#334155">${e.items.length} canais</span>
          </div>
          <span class="mono" style="font-size:13px;color:#38BDF8;font-weight:700">${fmt(entityTotal,true)}/mês</span>
        </div>
        <div style="background:#08111E;border-radius:12px;overflow:hidden;border:1px solid #1A2438">
          ${e.items.map((s,i) => {
            const nextBilling = new Date(today.getFullYear(), today.getMonth(), s.billingDay);
            if(nextBilling < today) nextBilling.setMonth(nextBilling.getMonth()+1);
            const daysUntil = Math.ceil((nextBilling - today)/(1000*60*60*24));
            const urgentColor = daysUntil<=3?'#FF6B35':daysUntil<=7?'#F59E0B':'#475569';
            const nextStr = String(nextBilling.getDate()).padStart(2,'0')+' '+monthNames[nextBilling.getMonth()];
            const billingStr = s.billingType==='anual'?'Todo ano dia '+s.billingDay:'Todo mês dia '+s.billingDay;
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;${i<e.items.length-1?'border-bottom:1px solid #0F1D2E':''}">
              <div style="display:flex;align-items:center;gap:8px;flex:1">
                <div style="width:6px;height:6px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
                <div style="flex:1">
                  <div style="font-size:12px;font-weight:600;color:#CBD5E1">${s.name}</div>
                  <div style="font-size:10px;color:#334155;margin-top:1px">${s.note}</div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
                <div style="text-align:center">
                  <div style="font-size:9px;color:#334155;margin-bottom:1px">${billingStr}</div>
                  <div style="font-size:10px;color:${urgentColor};font-weight:700">Próx: ${nextStr} ${daysUntil<=7?'<span style="background:'+urgentColor+'20;color:'+urgentColor+';padding:1px 5px;border-radius:4px;font-size:9px">'+daysUntil+'d</span>':''}</div>
                </div>
                <div class="mono" style="font-size:13px;font-weight:700;color:${s.color};min-width:52px;text-align:right">${fmt(s.value,true)}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}

    <!-- Month-by-month breakdown -->
    <div style="margin-bottom:18px">
      <div style="font-weight:700;font-size:13px;margin-bottom:10px;color:#94A3B8">📅 Gasto Real por Mês — clique para detalhar</div>
      ${filteredEntities.map(e => {
        const mo = MARKETING[e.id] && MARKETING[e.id].monthly && MARKETING[e.id].monthly[state.activeYear];
        if(!mo) return '';
        const months = Object.entries(mo).filter(([m,arr])=>Array.isArray(arr)&&arr.length>0);
        if(!months.length) return '';
        const entityYTD = months.reduce((s,[,arr])=>s+arr.reduce((a,i)=>a+i.value,0),0);
        return `<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:12px;font-weight:700;color:${e.color}">${e.name}</span>
            <span class="mono" style="font-size:12px;color:#38BDF8;font-weight:700">YTD ${state.activeYear}: ${fmt(entityYTD,true)}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px">
            ${months.map(([month,arr]) => {
              const total = arr.reduce((a,i)=>a+i.value,0);
              const domId = 'mkt-detail-'+e.id+'-'+month;
              return `<div>
                <div onclick="var el=document.getElementById('${domId}');el.style.display=el.style.display==='none'?'block':'none'"
                  style="background:#08111E;border:1px solid #1A2438;border-radius:8px;padding:7px 6px;text-align:center;cursor:pointer;transition:all .15s"
                  onmouseover="this.style.borderColor='#38BDF840'" onmouseout="this.style.borderColor='#1A2438'">
                  <div style="font-size:9px;color:#475569;margin-bottom:3px">${month}</div>
                  <div class="mono" style="font-size:11px;font-weight:700;color:#38BDF8">${fmt(total,true)}</div>
                  <div style="font-size:8px;color:#334155;margin-top:2px">${arr.length} canal${arr.length>1?'is':''} ▾</div>
                </div>
                <div id="${domId}" style="display:none;background:#050C18;border:1px solid #1A2438;border-top:none;border-radius:0 0 8px 8px;padding:6px 8px">
                  ${arr.map(ch=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #0F1D2E">
                    <div style="display:flex;align-items:center;gap:4px">
                      <div style="width:4px;height:4px;border-radius:50%;background:${ch.color}"></div>
                      <span style="font-size:9px;color:#94A3B8">${ch.name}</span>
                    </div>
                    <span class="mono" style="font-size:9px;color:${ch.color};font-weight:700">${fmt(ch.value,true)}</span>
                  </div>`).join('')}
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div style="background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.2);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Total Investido ${state.activeYear}</div>
        <div style="font-size:10px;color:#334155">${byEntity.reduce((s,e)=>s+e.items.length,0)} canais · estimativa ${fmt(grandTotal,true)}/mês</div>
      </div>
      <div style="text-align:right">
        <div class="mono" style="font-size:22px;font-weight:700;color:#38BDF8">${fmt(filteredEntities.reduce((s,e)=>{const mo=MARKETING[e.id]&&MARKETING[e.id].monthly&&MARKETING[e.id].monthly[state.activeYear];return s+(mo?Object.values(mo).reduce((a,arr)=>a+(Array.isArray(arr)?arr.reduce((x,i)=>x+i.value,0):0),0):0);},0),true)}</div>
        <div style="font-size:10px;color:#475569">desde 01 Jan ${state.activeYear}</div>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function openSubsModal(focusId) {
  // Convert to number since it arrives as string from HTML template
  const focusIdNum = focusId ? parseInt(focusId) : null;
  // If an entity is focused, show only that entity; otherwise show all
  const filteredEntities = focusIdNum
    ? ENTITIES.filter(e => e.id === focusIdNum)
    : ENTITIES;

  const allSubs = filteredEntities.flatMap(e => {
    const subs = (SUBSCRIPTIONS[e.id] && SUBSCRIPTIONS[e.id].items) || [];
    return subs.map(s => ({...s, entity: e.name, entityColor: e.color, entityId: e.id}));
  });
  const grandTotal = allSubs.reduce((s,i)=>s+i.value,0);

  const focusedEntity = focusIdNum ? ENTITIES.find(e => e.id === focusIdNum) : null;

  // Group by entity
  const byEntity = filteredEntities.map(e => ({
    ...e,
    subs: (SUBSCRIPTIONS[e.id] && SUBSCRIPTIONS[e.id].items) || []
  })).filter(e => e.subs.length > 0);

  const today = new Date();
  const currentDay = today.getDate();
  const monthNames = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:19px;font-weight:800">📋 Assinaturas Fixas Mensais</div>
        <div style="color:#475569;font-size:12px;margin-top:2px">${focusedEntity ? focusedEntity.name + " · cobranças recorrentes identificadas" : "Todas as empresas · cobranças recorrentes identificadas"}</div>
      </div>
      <div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:10px 18px;text-align:right">
        <div style="font-size:9px;color:#475569;letter-spacing:1px;text-transform:uppercase">Total Mensal</div>
        <div class="mono" style="font-size:24px;font-weight:700;color:#F59E0B">${fmt(grandTotal,true)}</div>
        <div style="font-size:10px;color:#475569">${fmt(grandTotal*12,true)}/ano</div>
      </div>
    </div>

    ${byEntity.map(e => {
      const entityTotal = e.subs.reduce((s,i)=>s+i.value,0);
      return `<div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:8px;height:8px;border-radius:50%;background:${e.color}"></div>
            <span style="font-weight:700;font-size:13px;color:${e.color}">${e.name}</span>
            <span style="font-size:10px;color:#334155">${e.subs.length} assinaturas</span>
          </div>
          <span class="mono" style="font-size:13px;color:#F59E0B;font-weight:700">${fmt(entityTotal,true)}/mês</span>
        </div>
        <div style="background:#08111E;border-radius:12px;overflow:hidden;border:1px solid #1A2438">
          ${e.subs.map((s,i) => {
            const nextBilling = new Date(today.getFullYear(), today.getMonth(), s.billingDay);
            if(nextBilling < today) nextBilling.setMonth(nextBilling.getMonth()+1);
            const daysUntil = Math.ceil((nextBilling - today) / (1000*60*60*24));
            const urgentColor = daysUntil <= 3 ? '#FF6B35' : daysUntil <= 7 ? '#F59E0B' : '#475569';
            const billingStr = s.billingType === 'anual' ? `Todo ano dia ${s.billingDay}` : `Todo mês dia ${s.billingDay}`;
            const nextStr = `${String(nextBilling.getDate()).padStart(2,'0')} ${monthNames[nextBilling.getMonth()]}`;
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;${i<e.subs.length-1?'border-bottom:1px solid #0F1D2E':''}">
              <div style="display:flex;align-items:center;gap:8px;flex:1">
                <div style="width:6px;height:6px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
                <div style="flex:1">
                  <div style="font-size:12px;font-weight:600;color:#CBD5E1">${s.name}</div>
                  <div style="font-size:10px;color:#334155;margin-top:1px">${s.note}</div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
                <div style="text-align:center">
                  <div style="font-size:9px;color:#334155;margin-bottom:1px">${billingStr}</div>
                  <div style="font-size:10px;color:${urgentColor};font-weight:700">Próx: ${nextStr} ${daysUntil<=7?'<span style="background:'+urgentColor+'20;color:'+urgentColor+';padding:1px 5px;border-radius:4px;font-size:9px">'+daysUntil+'d</span>':''}</div>
                </div>
                <div class="mono" style="font-size:13px;font-weight:700;color:${s.color};min-width:52px;text-align:right">${fmt(s.value,true)}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}

    <div style="background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Total Consolidado Mensal</div>
        <div style="font-size:10px;color:#334155">${allSubs.length} assinaturas ativas identificadas</div>
      </div>
      <div style="text-align:right">
        <div class="mono" style="font-size:22px;font-weight:700;color:#F59E0B">${fmt(grandTotal,true)}</div>
        <div style="font-size:10px;color:#475569">${fmt(grandTotal*12,true)} projetado/ano</div>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function setYear(y) { state.activeYear = y; render(); }
function toggleFocus(id) { state.focusId = state.focusId===id ? null : id; render(); }

// Initial render
render();
</script>
